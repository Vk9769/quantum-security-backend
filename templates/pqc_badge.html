<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:transparent;
    font-family:Arial, sans-serif;
}

.badge{
    width:320px;
    height:320px;
    position:relative;
}

.badge img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.domain{
    position:absolute;

    top:112px;
    left:50%;

    transform:translateX(-50%);

    width:80%;

    text-align:center;

    font-size:18px;
    font-weight:500;

    color:#111;

    line-height:1.2;

    word-break:break-word;
}

</style>
</head>

<body>

<div class="badge">

    <img src="{{BADGE_IMAGE}}" />

    <div class="domain">
        {{DOMAIN}}
    </div>

</div>

</body>
</html>
